<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <link rel="canonical" href="https://clawtvos.com/" />
    <title>ClawTVOS</title>
    <meta
      name="description"
      content="ClawTVOS — agent-powered TV for a new era."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&family=Saira+Extra+Condensed:wght@200;300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08090a;
        --fg: #f4f5f7;
        --muted: #6b7280;
        --accent: #34d399;
        --font-wordmark: "Saira Extra Condensed", ui-sans-serif, system-ui,
          sans-serif;
        --font-ui: "Outfit", ui-sans-serif, system-ui, sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--font-ui);
        color: var(--fg);
        background: var(--bg);
        background-image: radial-gradient(
          ellipse 80% 50% at 50% -20%,
          rgba(52, 211, 153, 0.08),
          transparent 55%
        );
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.5rem, 5vw, 3rem);
        text-align: center;
      }
      h1 {
        margin: 0;
        font-family: var(--font-wordmark);
        font-weight: 300;
        font-size: clamp(3.5rem, 15vw, 9.25rem);
        line-height: 0.92;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }
      h1 .claw {
        font-weight: 300;
      }
      h1 .tv {
        font-weight: 700;
        color: var(--accent);
      }
      h1 .os {
        font-weight: 400;
      }
      .tag {
        margin: 1.35rem auto 0;
        max-width: 22rem;
        font-size: 0.8125rem;
        font-weight: 400;
        letter-spacing: 0.06em;
        line-height: 1.45;
        text-transform: none;
        color: var(--muted);
      }
      footer {
        padding: 1.25rem;
        text-align: center;
        font-size: 0.75rem;
        font-weight: 400;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      footer a {
        color: inherit;
        text-decoration: none;
      }
      footer a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="logo" aria-label="ClawTVOS">
        <span class="claw">Claw</span><span class="tv">TV</span><span class="os">OS</span>
      </h1>
      <p class="tag">Agent-powered TV for a new era.</p>
    </main>
    <footer>
      <span>© <span id="y"></span></span>
      ·
      <a href="https://clawtvos.com/">clawtvos.com</a>
    </footer>
    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
